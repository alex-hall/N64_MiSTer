name: Quartus Compile (CodeBuild)

on:
  push:
    branches:
      - codex/vi-exp-phase3
  workflow_dispatch:
    inputs:
      codebuild_project:
        description: "CodeBuild runner project name"
        required: true
        default: MiSTer_Github_Action
        type: string
      instance_size:
        description: "CodeBuild runner instance size override"
        required: true
        default: large
        type: choice
        options:
          - small
          - medium
          - large
          - xlarge
          - 2xlarge

permissions:
  contents: read

jobs:
  quartus-compile:
    name: Quartus compile on CodeBuild runner
    timeout-minutes: 240
    runs-on:
      - ${{ format('codebuild-{0}-{1}-{2}', inputs.codebuild_project, github.run_id, github.run_attempt) }}
      - ${{ format('instance-size:{0}', inputs.instance_size) }}

    steps:
      - name: Checkout (shell)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git init .
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth 1 origin "${GITHUB_SHA}"
          git checkout --detach "${GITHUB_SHA}"

      - name: Verify Quartus CLI
        run: |
          if ! command -v quartus_sh >/dev/null 2>&1; then
            echo "quartus_sh not found in PATH on CodeBuild runner" >&2
            exit 1
          fi
          quartus_sh --version

      - name: Run Quartus regression compile
        run: tests/run_regression.sh --allow-missing-required-roms --quartus-compile

      - name: Collect Quartus report paths
        if: always()
        run: |
          echo "Build output files:"
          ls -1 output_files/*.rpt output_files/*.summary output_files/*.sof output_files/*.pof output_files/*.jic 2>/dev/null || true
